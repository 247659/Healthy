server:
  port: 8080

resilience4j:
  circuitbreaker:
    instances:
      medicalStaffService:
        failureRateThreshold: 50
        waitDurationInOpenState: 10000ms
        permittedNumberOfCallsInHalfOpenState: 3
spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:http://localhost:8888"
  cloud:
    loadbalancer:
      cache:
        ttl: 5s
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
            - name: Retry
              args:
                retries: 5
                methods: GET
                series: SERVER_ERROR
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 1000ms
                  factor: 2
          routes:
            - id: patient-service-route
              uri: lb://patient-service
              predicates:
                - Path=/api/v1/patients/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: patientService
                    fallbackUri: forward:/fallback/global
            - id: medical-staff-service-route
              uri: lb://medical-staff-service
              predicates:
                - Path=/api/v1/staff/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: medicalStaffService
                    fallbackUri: forward:/fallback/global
            - id: vital-signs-service-route
              uri: lb://vital-signs-service
              predicates:
                - Path=/api/v1/vital-signs/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: vitalSignsService
                    fallbackUri: forward:/fallback/global
            - id: notification-service-route
              uri: lb://notification-service
              predicates:
                - Path=/api/v1/notifications/**, /api/v1/ws-notifications/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: notificationService
                    fallbackUri: forward:/fallback/global
            - id: auth-service-route
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/auth/**
            - id: iot-integration-service-route
              uri: lb://iot-integration-service
              predicates:
                - Path=/api/v1/integration/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: integrationService
                    fallbackUri: forward:/fallback/global
            - id: visit-service-route
              uri: lb://visit-service
              predicates:
                - Path=/api/v1/visits/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: visitService
                    fallbackUri: forward:/fallback/global
          httpclient:
            connect-timeout: 5000
            response-timeout: 30s
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/healthmonitor-realm

  reactor:
    context-propagation: auto

medical-staff-service:
  url: http://localhost:8082

patient-service:
  url: http://localhost:8088

visit-service:
  url: http://localhost:8089

eureka:
  instance:
    instance-id: ${spring.application.name}:${server.port}